kind = "web"
previewPath = "/"
title = "HERMINIO59"
version = "1.0.0"
id = "artifacts/herminio59"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19813

[services.development]
run = "pnpm --filter @workspace/herminio59 run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/herminio59", "run", "build" ]
publicDir = "artifacts/herminio59/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19813"
BASE_PATH = "/"
